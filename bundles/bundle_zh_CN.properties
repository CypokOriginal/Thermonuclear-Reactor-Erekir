### LIQUIDS ###
liquid.termoatom-helium.name = 氦气
liquid.termoatom-helium.description = 轻质惰性气体。用于冷却和加速钻机。

### WALLS ###
block.termoatom-big-wall.name = 钴墙
block.termoatom-big-wall.description = 坚固的钴墙。

### DRILLS ###
block.termoatom-helium-eruption-drill.name = 氦气喷发钻机
block.termoatom-helium-eruption-drill.description = 以氦气为动力的强力地面钻机。开采钍和其他矿石。

block.termoatom-helium-extractor.name = 氦气提取器
block.termoatom-helium-extractor.description = 使用碳化物过滤器从埃雷基尔大气中提取氦气。

### REACTORS ###
block.termoatom-magnum-ignis-reactor.name = 马格南点火反应堆
block.termoatom-magnum-ignis-reactor.description = 巨大的热核反应堆。消耗氢气和巨大的启动能量。产生巨大能量。\n\n[gray]反应产生的氦气用于冷却超导磁体并蒸发到大气中。[]

block.termoatom-gamma-radiator-reactor.name = 伽马辐射反应堆
block.termoatom-gamma-radiator-reactor.description = 利用钍衰变辐照臭氧。产生氢气和能量。

block.termoatom-thorium-chaos-reactor.name = 钍混沌反应堆
block.termoatom-thorium-chaos-reactor.description = 用氢气轰击钍。产生能量和热熔渣。

### PROCESSORS ###
block.termoatom-beryllium-decay-chamber.name = 铍衰变室
block.termoatom-beryllium-decay-chamber.description = 利用核衰变将铍转化为氦气。

block.termoatom-beryllium-bombardment-chamber.name = 铍轰击室
block.termoatom-beryllium-bombardment-chamber.description = 用α粒子（氦）轰击铍，将其转化为石墨。

block.termoatom-ozone-converter.name = 臭氧转化器
block.termoatom-ozone-converter.description = 用α粒子（氦）轰击石墨，将其转化为臭氧。

block.termoatom-nitrogen-bombardment-chamber.name = 氮轰击室
block.termoatom-nitrogen-bombardment-chamber.description = 用α粒子（氦）轰击氮，产生臭氧和氢气。

block.termoatom-proton-accelerator.name = 质子加速器
block.termoatom-proton-accelerator.description = 用质子（氢）轰击臭氧，产生氮和氦。

block.termoatom-nitrogen-converter.name = 氮转化器
block.termoatom-nitrogen-converter.description = 将石墨和氢气转化为氮气。

block.termoatom-oxygen-synthesizer.name = 氧气合成器
block.termoatom-oxygen-synthesizer.description = 从氮气和氢气合成氧气。

block.termoatom-heat-pyrolyzer.name = 热解器
block.termoatom-heat-pyrolyzer.description = 无空气加热芳烃。产生氢气和石墨。温度越高，产量越高。

block.termoatom-erekir-slag-processor.name = 熔渣处理器
block.termoatom-erekir-slag-processor.description = 将热熔渣分离成有价值的成分：钨、碳化物、铍，偶尔还有浪涌合金。