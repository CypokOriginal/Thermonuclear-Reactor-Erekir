### LIQUIDS ###
liquid.termoatom-helium.name = Helium
liquid.termoatom-helium.description = Light inert gas. Used for cooling and boosting drills.

### WALLS ###
block.termoatom-big-wall.name = Cobalt Wall
block.termoatom-big-wall.description = A sturdy wall made of cobalt.

### DRILLS ###
block.termoatom-helium-eruption-drill.name = Helium Eruption Drill
block.termoatom-helium-eruption-drill.description = Powerful ground drill powered by helium. Mines thorium and other ores.

block.termoatom-helium-extractor.name = Helium Extractor
block.termoatom-helium-extractor.description = Extracts helium from Erekir's atmosphere using carbide filters.

### REACTORS ###
block.termoatom-magnum-ignis-reactor.name = Magnum Ignis Reactor
block.termoatom-magnum-ignis-reactor.description = A colossal thermonuclear reactor. Consumes hydrogen and enormous start-up power. Generates massive energy.\n\n[gray]The helium produced is used to cool superconducting magnets and evaporates into the atmosphere.[]

block.termoatom-gamma-radiator-reactor.name = Gamma Radiator Reactor
block.termoatom-gamma-radiator-reactor.description = Uses thorium decay to irradiate ozone. Produces hydrogen and energy.

block.termoatom-thorium-chaos-reactor.name = Thorium Chaos Reactor
block.termoatom-thorium-chaos-reactor.description = Bombards thorium with hydrogen. Produces energy and hot slag.

### PROCESSORS ###
block.termoatom-beryllium-decay-chamber.name = Beryllium Decay Chamber
block.termoatom-beryllium-decay-chamber.description = Uses nuclear decay to convert beryllium into helium.

block.termoatom-beryllium-bombardment-chamber.name = Beryllium Bombardment Chamber
block.termoatom-beryllium-bombardment-chamber.description = Bombards beryllium with alpha particles (helium), turning it into graphite.

block.termoatom-ozone-converter.name = Ozone Converter
block.termoatom-ozone-converter.description = Bombards graphite with alpha particles (helium), turning it into ozone.

block.termoatom-nitrogen-bombardment-chamber.name = Nitrogen Bombardment Chamber
block.termoatom-nitrogen-bombardment-chamber.description = Bombards nitrogen with alpha particles (helium), producing ozone and hydrogen.

block.termoatom-proton-accelerator.name = Proton Accelerator
block.termoatom-proton-accelerator.description = Bombards ozone with protons (hydrogen), producing nitrogen and helium.

block.termoatom-nitrogen-converter.name = Nitrogen Converter
block.termoatom-nitrogen-converter.description = Converts graphite and hydrogen into nitrogen.

block.termoatom-oxygen-synthesizer.name = Oxygen Synthesizer
block.termoatom-oxygen-synthesizer.description = Synthesizes oxygen from nitrogen and hydrogen.

block.termoatom-heat-pyrolyzer.name = Heat Pyrolyzer
block.termoatom-heat-pyrolyzer.description = Heats arkycite without air. Produces hydrogen and graphite. Higher temperature = higher yield.

block.termoatom-erekir-slag-processor.name = Slag Processor
block.termoatom-erekir-slag-processor.description = Separates hot slag into valuable components: tungsten, carbide, beryllium, and occasionally surge alloy.