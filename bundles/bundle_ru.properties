### LIQUIDS ###
liquid.termoatom-helium.name = Гелий
liquid.termoatom-helium.description = Лёгкий инертный газ. Используется для охлаждения и ускорения буров.

### WALLS ###
block.termoatom-big-wall.name = Кобальтовая стена
block.termoatom-big-wall.description = Прочная стена из кобальта.

### DRILLS ###
block.termoatom-helium-eruption-drill.name = Гелиевая извергающая дрель
block.termoatom-helium-eruption-drill.description = Мощный наземный бур, работающий на гелии. Добывает торий и другие руды.

block.termoatom-helium-extractor.name = Гелиевый экстрактор
block.termoatom-helium-extractor.description = Извлекает гелий из атмосферы Эрекира с помощью карбидных фильтров.

### REACTORS ###
block.termoatom-magnum-ignis-reactor.name = Термоядерный реактор Magnum Ignis
block.termoatom-magnum-ignis-reactor.description = Колоссальный термоядерный реактор. Потребляет водород и огромный стартовый импульс энергии. Вырабатывает гигантское количество энергии.\n\n[gray]Полученный в ходе реакции гелий идёт на охлаждение сверхпроводящих электромагнитов, где испаряется в атмосферу.[]

block.termoatom-gamma-radiator-reactor.name = Гамма-облучающий реактор
block.termoatom-gamma-radiator-reactor.description = Использует распад тория для облучения озона. Производит водород и энергию.

block.termoatom-thorium-chaos-reactor.name = Ториевый реактор хаоса
block.termoatom-thorium-chaos-reactor.description = Бомбардирует торий водородом. Производит энергию и горячий шлак.

### PROCESSORS ###
block.termoatom-beryllium-decay-chamber.name = Камера распада бериллия
block.termoatom-beryllium-decay-chamber.description = Использует ядерный распад для превращения бериллия в гелий.

block.termoatom-beryllium-bombardment-chamber.name = Камера бомбардировки бериллия
block.termoatom-beryllium-bombardment-chamber.description = Бомбардирует бериллий альфа-частицами (гелием), превращая его в графит.

block.termoatom-ozone-converter.name = Камера альфа-конверсии
block.termoatom-ozone-converter.description = Бомбардирует графит альфа-частицами (гелием), превращая его в озон.

block.termoatom-nitrogen-bombardment-chamber.name = Азотная бомбардировочная камера
block.termoatom-nitrogen-bombardment-chamber.description = Бомбардирует азот альфа-частицами (гелием), производя озон и водород.

block.termoatom-proton-accelerator.name = Протонный ускоритель
block.termoatom-proton-accelerator.description = Бомбардирует озон протонами (водородом), производя азот и гелий.

block.termoatom-nitrogen-converter.name = Азотный конвертер
block.termoatom-nitrogen-converter.description = Превращает графит и водород в азот.

block.termoatom-oxygen-synthesizer.name = Кислородный синтезатор
block.termoatom-oxygen-synthesizer.description = Синтезирует кислород из азота и водорода.

block.termoatom-heat-pyrolyzer.name = Пиролизёр
block.termoatom-heat-pyrolyzer.description = Нагревает аркицит без доступа воздуха. Производит водород и графит. Чем выше температура, тем больше выход.

block.termoatom-erekir-slag-processor.name = Переработчик шлака
block.termoatom-erekir-slag-processor.description = Разделяет горячий шлак на ценные компоненты: вольфрам, карбид, бериллий и иногда кинетический сплав.